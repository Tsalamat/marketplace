name: CI/CD kazgiu

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: kazgiu-${{ github.ref }}
  cancel-in-progress: true

env:
  DOMAIN: kazgiu.404tears.kz
  RELEASE_NAME: kazgiu
  KUBE_NAMESPACE: kazgiu
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Test and render chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://${{ env.DOMAIN }}
          VITE_WS_URL: wss://${{ env.DOMAIN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test backend
        run: go test ./...
        working-directory: backend

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Build Helm dependencies
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm dependency build ./my_project

      - name: Lint Helm chart
        run: helm lint ./my_project

      - name: Render Helm chart
        run: helm template "${RELEASE_NAME}" ./my_project

  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
      image_tag: ${{ steps.images.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "backend_image=${REGISTRY}/${repo}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${repo}-frontend" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}:${{ steps.images.outputs.image_tag }}
            ${{ steps.images.outputs.backend_image }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://${{ env.DOMAIN }}
            VITE_WS_URL=wss://${{ env.DOMAIN }}
          tags: |
            ${{ steps.images.outputs.frontend_image }}:${{ steps.images.outputs.image_tag }}
            ${{ steps.images.outputs.frontend_image }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_name == 'master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Build Helm dependencies
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm dependency build ./my_project

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Normalize EKS kubeconfig
        shell: bash
        run: |
          cluster_name="${EKS_CLUSTER_NAME}"
          if [ -z "$cluster_name" ]; then
            context="$(kubectl config current-context)"
            cluster_name="${context##*/}"
          fi
          aws eks update-kubeconfig \
            --name "$cluster_name" \
            --region "${AWS_REGION}" \
            --kubeconfig "$HOME/.kube/config"
          kubectl config current-context

      - name: Install Prometheus Operator CRDs
        run: |
          helm show crds ./my_project/charts/kube-prometheus-stack-*.tgz \
            | kubectl apply --server-side --force-conflicts -f -
          kubectl wait --for=condition=Established --timeout=120s crd/alertmanagers.monitoring.coreos.com
          kubectl wait --for=condition=Established --timeout=120s crd/prometheuses.monitoring.coreos.com
          kubectl wait --for=condition=Established --timeout=120s crd/prometheusrules.monitoring.coreos.com
          kubectl wait --for=condition=Established --timeout=120s crd/servicemonitors.monitoring.coreos.com

      - name: Create namespace
        run: kubectl create namespace "${KUBE_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Configure GHCR pull secret
        run: |
          kubectl -n "${KUBE_NAMESPACE}" create secret docker-registry ghcr-pull-secret \
            --docker-server="${REGISTRY}" \
            --docker-username="${{ secrets.GHCR_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Configure Grafana admin secret
        run: |
          kubectl -n "${KUBE_NAMESPACE}" create secret generic kazgiu-grafana-admin \
            --from-literal=admin-user="${{ secrets.GRAFANA_ADMIN_USER }}" \
            --from-literal=admin-password="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Remove legacy ingress for kazgiu domain
        run: |
          kubectl -n default delete ingress todo-ingress --ignore-not-found

      - name: Deploy Helm release
        run: |
          helm upgrade --install "${RELEASE_NAME}" ./my_project \
            --namespace "${KUBE_NAMESPACE}" \
            --set components.backend.image.repository="${{ needs.build.outputs.backend_image }}" \
            --set components.backend.image.tag="${{ needs.build.outputs.image_tag }}" \
            --set components.frontend.image.repository="${{ needs.build.outputs.frontend_image }}" \
            --set components.frontend.image.tag="${{ needs.build.outputs.image_tag }}" \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set certManager.clusterIssuer.create=false \
            --wait \
            --timeout 10m

      - name: Show rollout status
        run: |
          kubectl -n "${KUBE_NAMESPACE}" rollout status deployment/"${RELEASE_NAME}-my-project-backend" --timeout=5m
          kubectl -n "${KUBE_NAMESPACE}" rollout status deployment/"${RELEASE_NAME}-my-project-frontend" --timeout=5m
          kubectl -n "${KUBE_NAMESPACE}" get ingress,certificate,pods
