name: student_marketplace
description: Student Marketplace — find and offer student services
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.5

  # Network
  dio: ^5.4.0
  web_socket_channel: ^3.0.3

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  timeago: ^3.6.1
  intl: ^0.19.0
  fl_chart: ^0.67.0

  # Maps — OpenStreetMap (без API ключа)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Media & files
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  path: ^1.9.0

  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Auth
  google_sign_in: ^6.2.2

  # Utils
  uuid: ^4.3.3
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
