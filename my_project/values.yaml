domain: kazgiu.404tears.kz

replicaCount: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

appSecrets:
  create: true
  name: kazgiu-app-secrets
  data:
    DB_PASSWORD: smpassword
    REDIS_PASSWORD: redispassword
    JWT_ACCESS_SECRET: change-me-access-secret-min-32-chars
    JWT_REFRESH_SECRET: change-me-refresh-secret-min-32-chars
    MINIO_USER: minioadmin
    MINIO_PASSWORD: minioadmin123
    SMTP_USER: ""
    SMTP_PASS: ""
    GOOGLE_CLIENT_ID_WEB: ""
    GOOGLE_CLIENT_SECRET_WEB: ""

dependencies:
  postgres:
    enabled: true
    image: postgres:16-alpine
    database: studentmarketplace
    username: smuser
    storageSize: 10Gi
    service:
      port: 5432
  redis:
    enabled: true
    image: redis:7-alpine
    storageSize: 2Gi
    service:
      port: 6379
  minio:
    enabled: true
    image: minio/minio:latest
    storageSize: 20Gi
    service:
      apiPort: 9000
      consolePort: 9001

components:
  frontend:
    enabled: true
    image:
      repository: social_project_frontend
      tag: "2"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3000
      targetPort: 3000
    env:
      - name: VITE_API_URL
        value: "https://kazgiu.404tears.kz"
      - name: VITE_WS_URL
        value: "wss://kazgiu.404tears.kz"
    resources: {}
    readinessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 20
      periodSeconds: 20

  backend:
    enabled: true
    image:
      repository: social_project_backend
      tag: "1"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
    env:
      - name: APP_ENV
        value: production
      - name: APP_PORT
        value: "8080"
      - name: FRONTEND_URL
        value: "https://kazgiu.404tears.kz"
      - name: DB_HOST
        value: postgres
      - name: DB_PORT
        value: "5432"
      - name: DB_NAME
        value: studentmarketplace
      - name: DB_USER
        value: smuser
      - name: REDIS_HOST
        value: redis
      - name: REDIS_PORT
        value: "6379"
      - name: MINIO_ENDPOINT
        value: minio:9000
      - name: MINIO_BUCKET
        value: student-marketplace
      - name: MINIO_USE_SSL
        value: "false"
      - name: MINIO_PUBLIC_URL
        value: "https://kazgiu.404tears.kz/minio"
      - name: GOOGLE_CALLBACK_URL
        value: "https://kazgiu.404tears.kz/api/v1/auth/google/callback"
    envFrom:
      - secretRef:
          name: kazgiu-app-secrets
          optional: true
    resources: {}
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 20
      periodSeconds: 20

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    enabled: true
    secretName: kazgiu-404tears-tls
  hosts:
    - host: kazgiu.404tears.kz
      paths:
        - path: /api
          pathType: Prefix
          component: backend
        - path: /ws
          pathType: Prefix
          component: backend
        - path: /health
          pathType: Prefix
          component: backend
        - path: /
          pathType: Prefix
          component: frontend

certManager:
  clusterIssuer:
    create: true
    name: letsencrypt-prod
    email: admin@404tears.kz
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretName: letsencrypt-prod-account-key
    ingressClassName: nginx
  certificate:
    create: true
    name: kazgiu-404tears-tls
    secretName: kazgiu-404tears-tls
    dnsNames:
      - kazgiu.404tears.kz

autoscaling:
  enabled: false
  component: backend
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics

kube-prometheus-stack:
  fullnameOverride: monitoring
  alertmanager:
    enabled: true
  prometheus:
    prometheusSpec:
      retention: 7d
      scrapeInterval: 30s
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
  prometheusOperator:
    tls:
      enabled: false
    admissionWebhooks:
      enabled: false
  grafana:
    enabled: true
    admin:
      existingSecret: kazgiu-grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    grafana.ini:
      server:
        root_url: https://grafana.kazgiu.404tears.kz
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      hosts:
        - grafana.kazgiu.404tears.kz
      tls:
        - secretName: grafana-kazgiu-404tears-tls
          hosts:
            - grafana.kazgiu.404tears.kz

httpRoute:
  enabled: false
