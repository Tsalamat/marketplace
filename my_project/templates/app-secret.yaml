{{- if .Values.appSecrets.create -}}
{{- $name := .Values.appSecrets.name -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "my_project.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ include "my_project.secretValue" (dict "secret" $existing "key" "DB_PASSWORD" "value" .Values.appSecrets.data.DB_PASSWORD) | quote }}
  REDIS_PASSWORD: {{ include "my_project.secretValue" (dict "secret" $existing "key" "REDIS_PASSWORD" "value" .Values.appSecrets.data.REDIS_PASSWORD) | quote }}
  JWT_ACCESS_SECRET: {{ include "my_project.secretValue" (dict "secret" $existing "key" "JWT_ACCESS_SECRET" "value" .Values.appSecrets.data.JWT_ACCESS_SECRET) | quote }}
  JWT_REFRESH_SECRET: {{ include "my_project.secretValue" (dict "secret" $existing "key" "JWT_REFRESH_SECRET" "value" .Values.appSecrets.data.JWT_REFRESH_SECRET) | quote }}
  MINIO_USER: {{ include "my_project.secretValue" (dict "secret" $existing "key" "MINIO_USER" "value" .Values.appSecrets.data.MINIO_USER) | quote }}
  MINIO_PASSWORD: {{ include "my_project.secretValue" (dict "secret" $existing "key" "MINIO_PASSWORD" "value" .Values.appSecrets.data.MINIO_PASSWORD) | quote }}
  SMTP_USER: {{ include "my_project.secretValue" (dict "secret" $existing "key" "SMTP_USER" "value" .Values.appSecrets.data.SMTP_USER) | quote }}
  SMTP_PASS: {{ include "my_project.secretValue" (dict "secret" $existing "key" "SMTP_PASS" "value" .Values.appSecrets.data.SMTP_PASS) | quote }}
  GOOGLE_CLIENT_ID_WEB: {{ include "my_project.secretValue" (dict "secret" $existing "key" "GOOGLE_CLIENT_ID_WEB" "value" .Values.appSecrets.data.GOOGLE_CLIENT_ID_WEB) | quote }}
  GOOGLE_CLIENT_SECRET_WEB: {{ include "my_project.secretValue" (dict "secret" $existing "key" "GOOGLE_CLIENT_SECRET_WEB" "value" .Values.appSecrets.data.GOOGLE_CLIENT_SECRET_WEB) | quote }}
{{- end }}
