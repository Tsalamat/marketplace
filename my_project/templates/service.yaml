{{- $root := . -}}
{{- range $componentName, $component := .Values.components }}
{{- if $component.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "my_project.componentFullname" (dict "root" $root "component" $componentName) }}
  labels:
    {{- include "my_project.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $componentName }}
spec:
  type: {{ $component.service.type }}
  ports:
    - port: {{ $component.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "my_project.componentSelectorLabels" (dict "root" $root "component" $componentName) | nindent 4 }}
{{- end }}
{{- end }}
