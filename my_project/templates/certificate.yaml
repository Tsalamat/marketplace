{{- if .Values.certManager.certificate.create -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certManager.certificate.name }}
  labels:
    {{- include "my_project.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.certManager.certificate.secretName }}
  issuerRef:
    name: {{ .Values.certManager.clusterIssuer.name }}
    kind: ClusterIssuer
  dnsNames:
    {{- range .Values.certManager.certificate.dnsNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
