{{- if .Values.certManager.clusterIssuer.create -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name }}
spec:
  acme:
    email: {{ .Values.certManager.clusterIssuer.email | quote }}
    server: {{ .Values.certManager.clusterIssuer.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.certManager.clusterIssuer.privateKeySecretName }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.certManager.clusterIssuer.ingressClassName }}
{{- end }}
