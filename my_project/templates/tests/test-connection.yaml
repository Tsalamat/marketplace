apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "my_project.fullname" . }}-test-connection"
  labels:
    {{- include "my_project.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "my_project.componentFullname" (dict "root" . "component" "frontend") }}:{{ .Values.components.frontend.service.port }}']
  restartPolicy: Never
